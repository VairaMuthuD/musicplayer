<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Document</title>
</head>

<body>

    <div class="container">
        <div class="formBox">
            <form id="form" class="formEl">

                <label for="Name">Name:</label>
                <input type="text" id="name" name="name" value="" placeholder="Enter your name">

                <label for="dob">DOB:</label>
                <input type="date" id="dob" name="dob" value="" placeholder="Select your DOB">

                <div>
<label for="gender">Gender:</label>
                <input type="radio" id="gender" name="gender" value="Male"> <label for="gender">Male</label>
                <input type="radio" id="gender" name="gender" value="Female"> <label for="gender">Female</label>
                </div>
                

                <label for="gender">Education:</label>
                <select name="education" id="education" multiple>
                    <option disabled>Choose your graduation</option>
                    <option value="B.E">B.E </option>
                    <option value="B.Com ">B.Com </option>
                    <option value="B.Sc ">B.Sc </option>
                    <option value="MBBS">MBBS</option>
                    <option value="MS">MS</option>
                </select>

                <button type="submit">Submit</button>


            </form>
        </div>
        <div id="formValues" class="hideModal">
           
        </div>
    </div>



    <script src="Form.js"></script>
</body>

</html>
